name: Forex Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance ta requests pandas numpy
      - name: Run bot
        run: python main.py
