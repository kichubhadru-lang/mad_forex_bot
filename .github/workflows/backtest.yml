name: Forex V2 Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run V2 backtest
        run: python backtest_v2.py

      - name: Upload backtest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forex-v2-backtest-results
          path: |
            backtest_reports/*.csv
            backtest_reports/*.txt
            backtest_reports/*.png
          if-no-files-found: warn
